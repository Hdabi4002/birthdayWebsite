<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Us 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
}

.slider {
  width: 85%;
  max-width: 350px;
  height: 450px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  z-index: 10;
  background: white;
  border: 4px solid #ff2e63;
  position: relative; /* so button can sit inside */
}

.slides {
  display: flex;
  height: 100%;
  width: 100%;
  transition: transform 0.8s ease-in-out;
}

.slides img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  flex-shrink: 0;
}

.fall {
  position: absolute;
  top: -150px;
  border-radius: 20px;
  animation: fall linear infinite;
  opacity: 1;
  z-index: 1;
  filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
}

@keyframes fall {
 0% {
    transform: translateY(-10vh) rotate(0deg);
    opacity: 1;
  }
 100% {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}

/* LEFT RIGHT SPLIT */
.left,.right {
  position: absolute;
  top: 0;
  width: 50%;
  height: 100%;
  pointer-events: none;
}

.left { left: 0; }
.right { right: 0; }

@media (max-width: 768px) {
  body {
    overflow: hidden;
  }
.slider {
    width: 78%;
    max-width: 280px;
    height: 380px;
    border-radius: 18px;
    border: 3px solid #ff2e63;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
.slides img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
.left,.right {
    width: 100%;
    height: 100%;
  }
}

/* button container - inside slider */
.nav-buttons {
  position: absolute;
  top: 10px;
  right: 10px;
  display: flex;
  gap: 8px;
  z-index: 9999;
}

.nav-btn {
  width: 30px;
  height: 30px;
  border: none;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.9);
  color: #ff4d6d;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.3s;
  display: flex;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(4px);
}

.nav-btn:hover {
  background: #ff4d6d;
  color: white;
  transform: scale(1.1);
}
</style>
</head>

<body>

    <audio id="bgMusic" autoplay loop>
        <source src="Taare - DjBaap.mp3" type="audio/mpeg">
    </audio>

<div class="left" id="left"></div>
<div class="right" id="right"></div>

<div class="slider">
  <!-- Navigation Buttons inside slider -->
  <div class="nav-buttons">
    <button class="nav-btn" onclick="window.location.href='surprise.html'" title="Close">
      ✖
    </button>
    <button class="nav-btn" onclick="window.location.href='gift5.html'" title="Next">
      ➡
    </button>
  </div>

  <div class="slides" id="slides">
    <img src="img1.jpg">
    <img src="img2.jpg">
    <img src="img3.jpg">
    <img src="img4.jpg">
  </div>
</div>

<script>
const slides = document.getElementById("slides");
const images = slides.querySelectorAll("img");

let index = 0;
const total = images.length;

const firstClone = images[0].cloneNode(true);
slides.appendChild(firstClone);

const newTotal = total + 1;

setInterval(() => {
  index++;
  slides.style.transition = "transform 0.8s ease-in-out";
  slides.style.transform = `translateX(-${index * 100}%)`;

  if (index === newTotal - 1) {
    setTimeout(() => {
      slides.style.transition = "none";
      index = 0;
      slides.style.transform = "translateX(0)";
    }, 800);
  }
}, 2000);

const myImages = ["Heart1.png", "Heart2.png", "Heart3.png", "Heart4.png"];

function createFalling(parent) {
  for (let i = 0; i < 10; i++) {
    let img = document.createElement("img");
    img.classList.add("fall");
    img.src = myImages[Math.floor(Math.random() * myImages.length)];
    img.style.left = Math.random() * 100 + "%";
    let size = 80 + Math.random() * 70;
    img.style.width = size + "px";
    img.style.height = "auto";
    img.style.animationDuration = (5 + Math.random() * 5) + "s";
    img.style.opacity = "1";
    img.style.filter = "drop-shadow(0 10px 15px rgba(0,0,0,0.3))";
    parent.appendChild(img);
  }
}

createFalling(document.getElementById("left"));
createFalling(document.getElementById("right"));

const music = document.getElementById("bgMusic");
document.body.addEventListener("click", () => {
  music.play();
});
</script>
<script>
window.addEventListener("load", () => {
    document.body.classList.add("loaded");
    document.querySelectorAll("img").forEach(img => {
        if (img.complete) {
            img.classList.add("loaded");
        } else {
            img.addEventListener("load", () => {
                img.classList.add("loaded");
            });
        }
    });
});
</script>
</body>
</html>
