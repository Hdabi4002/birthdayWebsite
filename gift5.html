<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wish for Siya</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

.heart5{
    width:100%;
    min-height:100vh;
    background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url("bg3.jpg") center center/cover no-repeat;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:15px;
    gap: 12px; 
}

.img-box{
    width:min(90vw,500px);
    
    max-height: 75vh;
    border:4px solid #000;
    border-radius:12px;
    overflow:hidden;
    flex-shrink: 0;
}

.img-box img{
    width:100%;
    height:auto;
    max-height: 75vh; 
    object-fit:contain; 
    display:block;
}

.bottom-text{
    font-family:'Cinzel', serif;
    font-size:clamp(14px, 3.2vw, 24px); 
    font-weight:600;
    color:#fffefe;
    text-align:center;
    text-transform:uppercase;
    letter-spacing:1px;
    line-height:1.3;
    text-shadow:1px 1px 2px rgba(5, 5, 5, 0.5);
    padding: 0 10px;
    max-width: 95%;
    white-space: normal;
}
    .close-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 45px;
  height: 45px;
  border: none;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.9);
  color: #ff4d6d;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  z-index: 9999;
  transition: 0.3s;
}

.close-btn:hover {
  background: #ff4d6d;
  color: white;
  transform: scale(1.1);
}
</style>
</head>

<body>
<button class="close-btn" onclick="window.location.href='surprise.html'">
  ✖
</button>
<section class="heart5">

    <div class="img-box">
        <img src="Flower_cake.png" alt="Top Image">
    </div>

    <div class="bottom-text">
        MAY ALL YOUR DREAMS COME TRUE
    </div>

</section>
<script>
window.addEventListener("load", () => {
    // Smooth page fade-in
    document.body.classList.add("loaded");

    // Smooth image loading
    document.querySelectorAll("img").forEach(img => {
        if (img.complete) {
            img.classList.add("loaded");
        } else {
            img.addEventListener("load", () => {
                img.classList.add("loaded");
            });
        }
    });
});
</script>
</body>
</html>
