<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart 5</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

.heart5{
    width:100%;
    height:100vh;
    background:url("bg3.jpg") center center/cover no-repeat;
background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("bg3.jpg") center center/cover no-repeat;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}

.img-box{
    width:min(90vw,500px);
    height:min(78vh,700px);
    border:4px solid #000;
    border-radius:12px;
    overflow:hidden;
}

.img-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

    .bottom-text{
    font-family:'Cinzel', serif;
    font-size:clamp(14px, 4vw, 28px); /* 18px se 14px kar diya, 40px se 28px */
    font-weight:600;
    color:#fffefe;
    text-align:center;
    text-transform:uppercase;
    letter-spacing:1px; 
    line-height:1.4;
    text-shadow:1px 1px 2px rgba(5, 5, 5, 0.5);
    margin-bottom:10px;
    padding: 0 15px; 
    white-space: normal; 
    word-wrap: break-word; 
    }
</style>
</head>

<body>

<section class="heart5">

    <div class="img-box">
        <img src="withlove.jpg" alt="Top Image">
    </div>

    <div class="bottom-text">
        MAY ALL YOUR DREAMS COME TRUE
    </div>

</section>
<script>
window.addEventListener("load", () => {
    // Smooth page fade-in
    document.body.classList.add("loaded");

    // Smooth image loading
    document.querySelectorAll("img").forEach(img => {
        if (img.complete) {
            img.classList.add("loaded");
        } else {
            img.addEventListener("load", () => {
                img.classList.add("loaded");
            });
        }
    });
});
</script>
</body>
</html>
