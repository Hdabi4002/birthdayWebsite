<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.video-bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(0.6);
}

.container {
  display: flex;
  height: 100vh;
}

.left {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.slider {
  height: 100%;
  overflow: hidden;
  display: flex;
  align-items: center;
}

.slider-track {
  display: flex;
  flex-direction: column;
  gap: 15px;

  animation: scrollUp 8s linear infinite;
}


@keyframes scrollUp {
  0% {
    transform: translateY(0);
  }
  100% {
    transform: translateY(-50%);
  }
}

.slider img {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.right {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
}

.right img {
  width: min(450px, 90%);
  height: min(650px, 85vh);
  object-fit: cover;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

@media (max-width: 768px) {

  .container {
    flex-direction: column;
  }

  .left {
    flex: 1;
    height: 50vh;
  }

  .right {
    flex: 1;
    height: 50vh;
    padding-bottom: 15px; 
  }

  .slider img {
    width: 130px;
    height: 130px;
  }

  .right img {
    width: 85%;
    height: 90%;
    object-fit: cover;
  }
}
</style>
</head>

<body>

<video class="video-bg" autoplay muted loop>
  <source src="bg1.mp4" type="video/mp4">
</video>

<div class="container">

  <div class="left">
    <div class="slider">
      <div class="slider-track">

        <img src="CuteCouple1.jpg">
        <img src="CuteCouple2.jpg">
        <img src="CuteCouple3.jpg">

        <img src="CuteCouple1.jpg">
        <img src="CuteCouple2.jpg">
        <img src="CuteCouple3.jpg">

        <img src="CuteCouple1.jpg">
        <img src="CuteCouple2.jpg">
        <img src="CuteCouple3.jpg">

        <img src="CuteCouple1.jpg">
        <img src="CuteCouple2.jpg">
        <img src="CuteCouple3.jpg">

      </div>
    </div>
  </div>

  <div class="right">
    <img src="holdinghandswish.jpg">
  </div>

</div>

</body>
</html>
