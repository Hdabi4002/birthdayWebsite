<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body {
  margin: 5px;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.video-bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(0.6);
}

.container {
  display: flex;
  height: 100vh;
}

.left {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.slider {
  height: 100%;
  overflow: hidden;
  display: flex;
  align-items: center;
}

.slider-track {
  display: flex;
  flex-direction: column;
  gap: 15px;

  animation: scrollUp 8s linear infinite;
}


@keyframes scrollUp {
  0% {
    transform: translateY(0);
  }
  100% {
    transform: translateY(-50%);
  }
}

.slider img {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.right {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
}

.right img {
  width: min(450px, 90%);
  height: min(650px, 85vh);
  object-fit: cover;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

@media (max-width: 768px) {

  .container {
    flex-direction: column;
    height: 100vh;
  }

  .left {
    height: 20vh;
  }

  .right {
    height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }
  .right img {
    width: auto;
    height: 100%;
    max-width: 100%;
    object-fit: contain;   
    border-radius: 15px;
  }

  .slider img {
    width: 120px;
    height: 120px;
  }
}
  .close-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 45px;
  height: 45px;
  border: none;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.9);
  color: #ff4d6d;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  z-index: 9999;
  transition: 0.3s;
}

.close-btn:hover {
  background: #ff4d6d;
  color: white;
  transform: scale(1.1);
}
</style>
</head>

<body>
<button class="close-btn" onclick="window.location.href='surprise.html'">
  ✖
</button>
<video class="video-bg" autoplay muted loop>
  <source src="bg1.mp4" type="video/mp4">
</video>

<div class="container">

  <div class="left">
    <div class="slider">
      <div class="slider-track">

        <img src="CuteCouple1.jpg">
        <img src="CuteCouple2.jpg">
        <img src="CuteCouple3.jpg">

        <img src="CuteCouple1.jpg">
        <img src="CuteCouple2.jpg">
        <img src="CuteCouple3.jpg">

        <img src="CuteCouple1.jpg">
        <img src="CuteCouple2.jpg">
        <img src="CuteCouple3.jpg">

        <img src="CuteCouple1.jpg">
        <img src="CuteCouple2.jpg">
        <img src="CuteCouple3.jpg">

      </div>
    </div>
  </div>

  <div class="right">
    <img src="InShot_20260714_113901523.jpg">
  </div>

</div>

</body>
</html>
